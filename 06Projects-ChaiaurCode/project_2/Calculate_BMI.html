<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Calculate BMI </title>
</head>
<body>
    <form action="">
        <h1>BMI Calculator</h1>

 <p> <label>Height in CM : </label><input id="height" type="text"></p>
    <p> <label>Weight in kG : </label><input id="weight" type="text"></p>
    <button>Calculator</button>
    <div id="result"></div>
    <div id="weight-guide">
        <p id="range"></p>
        <h3>Weight Guide</h3>
        <p>Under Weight = Less Than 18.6Kg</p>
        <p>Normal Range =  18.6Kg to 24.9</p>
        <p>OverWeight = Greater Than 18.6Kg</p>
    </div>
    </form>
</body>
 <script src="calculator.js"></script>
</html>
